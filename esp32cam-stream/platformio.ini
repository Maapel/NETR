; PlatformIO Project Configuration File
;
; Wired flash (first time only):
;   pio run -e cam1 --target upload --upload-port /dev/ttyUSB0
;   pio run -e cam2 --target upload --upload-port /dev/ttyUSB0
;
; OTA flash (all subsequent uploads):
;   pio run -e cam1_ota --target upload
;   pio run -e cam2_ota --target upload

; ── Shared base ───────────────────────────────────────────────────────────────
[base]
platform  = espressif32
board     = esp32cam
framework = arduino
monitor_speed  = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; ── Camera 1 — wired ──────────────────────────────────────────────────────────
[env:cam1]
extends      = base
upload_speed = 921600
build_flags  = ${base.build_flags} -DCAM_ID=1

; ── Camera 1 — OTA ────────────────────────────────────────────────────────────
[env:cam1_ota]
extends         = base
upload_protocol = espota
upload_port     = 10.150.37.102
upload_flags    =
    --port=3232
    --auth=esp32ota
build_flags     = ${base.build_flags} -DCAM_ID=1

; ── Camera 2 — wired ──────────────────────────────────────────────────────────
[env:cam2]
extends      = base
upload_speed = 921600
build_flags  = ${base.build_flags} -DCAM_ID=2

; ── Camera 2 — OTA ────────────────────────────────────────────────────────────
; Fill in upload_port after first wired flash (check serial: "Wi-Fi OK — IP: x.x.x.x")
[env:cam2_ota]
extends         = base
upload_protocol = espota
upload_port     = 10.150.37.163
upload_flags    =
    --port=3232
    --auth=esp32ota
build_flags     = ${base.build_flags} -DCAM_ID=2
