; PlatformIO Project Configuration File
; ESP32-CAM single-camera TCP streaming test

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32-CAM uses a specific partition scheme to fit camera + OTA
board_build.partitions = huge_app.csv

; Increase stack size and enable PSRAM
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
