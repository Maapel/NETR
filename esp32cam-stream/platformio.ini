; PlatformIO Project Configuration File

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

; ── Wired upload (first flash only) ──────────────────────────────────────────
upload_speed = 921600

; ── OTA upload (after first flash) ───────────────────────────────────────────
; To use: pio run -e esp32cam_ota --target upload
[env:esp32cam_ota]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port = 192.168.137.149   ; ESP32-CAM IP
upload_flags =
    --port=3232
    --auth=esp32ota             ; must match OTA_PASSWORD in firmware

; ── Shared settings ───────────────────────────────────────────────────────────
[env]
board_build.partitions = min_spiffs.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
